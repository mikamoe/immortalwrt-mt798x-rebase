name: 🚀 ImmortalWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "📦 是否发布到 Releases"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "🧪 是否标记为预发布版本（仅在发布 Releases 时生效）"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: immortalwrt-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/chasey-dev/immortalwrt-mt798x-rebase
  REPO_BRANCH: 25.12-dev
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    name: 🛠️ Build Firmware
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧾 Init build options
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "UPLOAD_RELEASE=${{ inputs.upload_release }}" >> "$GITHUB_ENV"
            if [ "${{ inputs.upload_release }}" = "true" ] && [ "${{ inputs.prerelease }}" = "true" ]; then
              echo "PRERELEASE=true" >> "$GITHUB_ENV"
            else
              echo "PRERELEASE=false" >> "$GITHUB_ENV"
            fi
          else
            echo "UPLOAD_RELEASE=${UPLOAD_RELEASE}" >> "$GITHUB_ENV"
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: 🧹 Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/*
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto \
            xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER:$USER" /workdir
          mkdir -p "$HOME/.ccache"

      - name: 📦 Clone source code
        working-directory: /workdir
        run: |
          df -hT "$PWD"
          git clone --single-branch --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

      - name: ⚡ Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-${{ hashFiles('.config') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-ccache-

      - name: 📦 Restore dl cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-${{ hashFiles('feeds.conf.default', '.config', 'diy-part1.sh', 'diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-dl-

      - name: 🧩 Load custom feeds
        run: |
          [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
          [ -e "$DIY_P1_SH" ] && chmod +x "$DIY_P1_SH"
          cd openwrt
          [ -e "$GITHUB_WORKSPACE/$DIY_P1_SH" ] && "$GITHUB_WORKSPACE/$DIY_P1_SH"

      - name: 🔄 Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: 📚 Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: ⚙️ Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" openwrt/.config
          [ -e "$DIY_P2_SH" ] && chmod +x "$DIY_P2_SH"
          cd openwrt
          [ -e "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && "$GITHUB_WORKSPACE/$DIY_P2_SH"

          # 修改默认 LAN IP 为 192.168.6.1
          sed -i 's/192\.168\.1\.1/192.168.6.1/g' package/base-files/files/bin/config_generate

      - name: 🧠 Configure ccache
        run: |
          {
            echo "CCACHE_DIR=$HOME/.ccache"
            echo "CCACHE_COMPRESS=1"
            echo "CCACHE_MAXSIZE=2G"
          } >> "$GITHUB_ENV"

      - name: 📥 Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 🏗️ Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo "CONFIG_CCACHE=y" >> .config
          make defconfig
          echo -e "$(nproc) thread compile"
          make -j"$(nproc)" || make -j1 || make -j1 V=s
          echo "status=success" >> "$GITHUB_OUTPUT"
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

      - name: 📊 Show ccache stats
        if: (!cancelled())
        run: ccache -s || true

      - name: 📊 Check space usage
        if: (!cancelled())
        run: df -hT

      - name: 📁 Upload bin directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: immortalwrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: 📂 Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages

          mkdir -p "$GITHUB_WORKSPACE/upload"

          find "$PWD" -maxdepth 1 -type f -name '*sysupgrade.bin' -exec cp -f {} "$GITHUB_WORKSPACE/upload/" \;

          if [ -z "$(ls -A "$GITHUB_WORKSPACE/upload" 2>/dev/null)" ]; then
            echo "❌ No sysupgrade firmware found!"
            exit 1
          fi

          echo "FIRMWARE=$GITHUB_WORKSPACE/upload" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "✅ Files to upload:"
          ls -lh "$GITHUB_WORKSPACE/upload"

      - name: 🚚 Upload sysupgrade firmware
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: immortalwrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: 🏷️ Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_OUTPUT"
          {
            echo "## 📦 ImmortalWrt Firmware Build"
            echo ""
            echo "- Source: \`${REPO_URL}\`"
            echo "- Branch: \`${REPO_BRANCH}\`"
            echo "- Device: \`${DEVICE_NAME}\`"
            echo "- Build Time: \`$(date +"%Y-%m-%d %H:%M:%S")\`"
            echo "- Prerelease: \`${PRERELEASE}\`"
            echo "- Files: \`sysupgrade only\`"
          } > release.txt
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: 🚀 Upload sysupgrade to release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled() && env.UPLOAD_RELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*
          prerelease: ${{ env.PRERELEASE == 'true' }}

      - name: 🗑️ Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 9
